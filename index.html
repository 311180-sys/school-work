<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>學生成績管理系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

        .btn-delete {
            background: red;
            color: white;
            border: none;
        }

        .btn-add {
            background: green;
            color: white;
            border: none;
        }

        .btn-action {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>學生成績管理系統</h1>

    <div>
        <input type="text" id="name" placeholder="學生姓名">
        <input type="number" id="score" placeholder="成績">
        <button class="btn-add" onclick="addStudent()">新增學生</button>
    </div>

    <div>
        <input type="text" id="search" placeholder="搜尋學生">
        <button class="btn-action" onclick="searchStudent()">查詢</button>
        <button class="btn-action" onclick="showAll()">顯示全部</button>
        <button class="btn-action" onclick="showAverage()">計算平均</button>
    </div>

    <h3 id="avgText"></h3>

    <table>
        <thead>
            <tr>
                <th>姓名</th>
                <th>成績</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let students = JSON.parse(localStorage.getItem("students")) || [];

    function save() {
        localStorage.setItem("students", JSON.stringify(students));
    }

    function render(list = students) {
        const table = document.getElementById("tableBody");
        table.innerHTML = "";

        list.forEach((s, index) => {
            table.innerHTML += `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.score}</td>
                    <td><button class="btn-delete" onclick="deleteStudent(${index})">刪除</button></td>
                </tr>
            `;
        });
    }

    function addStudent() {
        const name = document.getElementById("name").value;
        const score = parseInt(document.getElementById("score").value);

        if (!name || isNaN(score)) {
            alert("請輸入完整資料");
            return;
        }

        students.push({ name, score });
        save();
        render();
    }

    function deleteStudent(index) {
        students.splice(index, 1);
        save();
        render();
    }

    function searchStudent() {
        const keyword = document.getElementById("search").value;
        const result = students.filter(s => s.name.includes(keyword));
        render(result);
    }

    function showAll() {
        render();
    }

    function showAverage() {
        if (students.length === 0) {
            document.getElementById("avgText").innerText = "沒有資料";
            return;
        }

        let sum = students.reduce((a, b) => a + b.score, 0);
        let avg = sum / students.length;

        document.getElementById("avgText").innerText =
            "平均成績：" + avg.toFixed(2);
    }

    render();
</script>

</body>
</html>
